#:schema node_modules/wrangler/config-schema.json

name = "ai-playground"
main = "src/worker/index.ts"
compatibility_date = "2026-03-10"
compatibility_flags = ["nodejs_compat"]

[[d1_databases]]
binding = "DB"
database_name = "ai-playground-db"
database_id = "00000000-0000-0000-0000-000000000000"


[placement]
mode = "smart"

[assets]
directory = "./dist"
binding = "ASSETS"

[observability]
enabled = true
head_sampling_rate = 1

# Runtime vars — set real values via `wrangler secret put` or CF dashboard for production.
# For local dev, override in .dev.vars (git-ignored).
[vars]
BASE_URL = "https://openrouter.ai/api/v1"
MODEL = ""
SYSTEM_PROMPT = ""
SITE_URL = ""
SITE_NAME = ""
SITE_CATEGORIES = ""
# API_KEY must be set as a secret: `wrangler secret put API_KEY`
